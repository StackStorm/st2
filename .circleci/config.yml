# Setup in CircleCI account the following ENV variables:
# PACKAGECLOUD_ORGANIZATION (default: stackstorm)
# PACKAGECLOUD_TOKEN
version: 2
jobs:
  # Run st2 Unit Tests
  unit:
    # 'machine' executor runs Unit tests ~x1.5 faster, comparing to 'docker' executor
    # but the fastest is still ~x1.5-2 slower, comparing to Travis
    machine: true
    parallelism: 4
    working_directory: ~/st2
    steps:
      - checkout
      - restore_cache:
          keys:
            - st2-unit-001-{{ checksum "fixed-requirements.txt" }}-{{ checksum "test-requirements.txt" }}
      - run:
          name: Prepare the environment
          command: |
            set -x
            sudo .circle/install-mongo.sh
            sudo .circle/configure-rabbitmq.sh
            sudo apt-get -qq -y install python-virtualenv python-dev
      - run:
          name: Create stanley user
          command: sudo .circle/add-itest-user.sh
      - run:
          name: Check virtualenv bundled wheels
          command: bash .circle/check-virtualenv-wheels.sh
      - run:
          name: Install pip requirements
          command: make requirements
      - run:
          name: Run st2 Unit Tests
          command: |
            # Workaround for table width/height used in some tests
            stty rows 50 cols 132
            make ci-unit
      - save_cache:
          key: st2-unit-001-{{ checksum "fixed-requirements.txt" }}-{{ checksum "test-requirements.txt" }}
          paths:
            - ~/.cache/pip/
            - virtualenv/

  # Run st2 Integration tests
  integration:
    docker:
      - image: cimg/python:3.10
      - image: mongo:8.2
      - image: rabbitmq:4.2
    working_directory: ~/st2
    steps:
      - checkout
      - restore_cache:
          keys:
            - st2-integration-001-{{ checksum "fixed-requirements.txt" }}-{{ checksum "test-requirements.txt" }}
      - run:
          # Download the mongo shell, needed to connect to Docker container + delete the DB
          name: Install Mongo Shell
          command: |
            set -x
            sudo apt-get -qq -y install gnupg curl
            curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/mongodb-server-7.0.gpg
            echo "deb [ arch=amd64 ] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
            sudo apt-get -qq -y update
            sudo apt-get -qq -y install mongodb-org-shell
      - run:
          name: Create stanley user
          command: sudo .circle/add-itest-user.sh
      - run:
          name: Check virtualenv bundled wheels
          command: bash .circle/check-virtualenv-wheels.sh
      - run:
          name: Install pip requirements
          command: make requirements
      - run:
          name: Run st2 Integration Tests
          command: make ci-integration
      - save_cache:
          key: st2-integration-001-{{ checksum "fixed-requirements.txt" }}-{{ checksum "test-requirements.txt" }}
          paths:
            - ~/.cache/pip/
            - virtualenv/

  # Run st2 Lint Checks
  lint:
    docker:
      - image: cimg/python:3.10
      - image: mongo:8.2
      - image: rabbitmq:4.2
    working_directory: ~/st2
    steps:
      - checkout
      - restore_cache:
          keys:
            # we can use the same caching env as for integration
            - st2-integration-001-{{ checksum "fixed-requirements.txt" }}-{{ checksum "test-requirements.txt" }}
      - run:
          name: Check virtualenv bundled wheels
          command: bash .circle/check-virtualenv-wheels.sh
      - run:
          name: Install pip requirements
          command: make requirements
      - run:
          name: Run st2 Lint Checks
          command: make ci-checks
      - run:
          name: Run st2 Packs Tests
          command: make ci-packs-tests
      - save_cache:
          # we can use the same caching env as for integration
          key: st2-integration-001-{{ checksum "fixed-requirements.txt" }}-{{ checksum "test-requirements.txt" }}
          paths:
            - ~/.cache/pip/
            - virtualenv/

  # Build & Test st2 packages
  packages:
    parallelism: 2
    # 4CPUs & 8GB RAM CircleCI machine
    # sadly, it doesn't work with 'setup_remote_docker'
    resource_class: large
    docker:
      # The primary container is an instance of the first list image listed. Your build commands run in this container.
      - image: cimg/python:3.10
    working_directory: ~/st2
    environment:
      - DISTROS: "jammy el9"
      - ST2_PACKAGES_REPO: https://github.com/StackStorm/st2-packages
      - ST2_PACKAGES: "st2"
      - ST2_CHECKOUT: 0
      - ST2_GITDIR: /tmp/st2
      - BASH_ENV: ~/.buildenv
      - DOCKER_API_VERSION: "1.43"
    steps:
      - checkout
      - run:
          name: Install latest Docker Compose V2
          command: |
            set -x
            export CODENAME=$(source /etc/os-release && echo "$VERSION_CODENAME")
            export DISTRO=$(source /etc/os-release && echo "$ID")
            export ARCH=$(dpkg --print-architecture)
            # get gpg key for download.docker
            curl -fsSL https://download.docker.com/linux/${DISTRO}/gpg | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/download.docker.gpg
            # set source list
            sudo tee <<<"deb [arch=${ARCH}] https://download.docker.com/linux/${DISTRO} ${CODENAME} stable" /etc/apt/sources.list.d/download.docker.list
            # update package list
            sudo apt update
            # install docker CLI and Docker Compose v2
            sudo apt install docker-ce-cli docker-compose-plugin
      - setup_remote_docker:
          reusable: true    # default - false
          exclusive: true   # default - true
          version: docker24
      - run:
          name: Docker version
          command: |
            set -x
            docker --version
            docker compose version
      - run:
          name: Clone and patch st2-packages repository
          command: |
            set -x
            PIP_VERSION=$(grep ^PIP_VERSION Makefile | grep -o '[0-9.]*$')
            echo "St2 makefile file pip version ${PIP_VERSION}"
            git clone ${ST2_PACKAGES_REPO} ~/st2-packages
            cd ~/st2-packages
            echo "Patch PIP version used by dh_virtualenv"
            sed -ri "s/^PIP_VERSION .*$/PIP_VERSION = ${PIP_VERSION}/" packages/st2/debian/rules
            echo "Patch PIP version used by rpm spec"
            sed -ri "s/install pip==[^\s]+/install pip==${PIP_VERSION}/" rpmspec/package_venv.spec
      - run:
          name: Initialize packages Build Environment
          command: |
            set -x
            export ST2_GITREV=${CIRCLE_BRANCH}
            .circle/buildenv_st2.sh
          working_directory: ~/st2-packages
      # Verify that Docker environment is properly cleaned up and there is nothing left from the previous build
      # See issue: https://discuss.circleci.com/t/no-space-left-on-device-while-creating-mongo/11532/13
      - run:
          name: Pre Docker cleanup
          command: |
            set -x
            # Clean-up running containers
            .circle/docker-compose.sh clean
            # Remove st2-packages-vol container
            docker rm -v --force st2-packages-vol || true
            # Clean-up any created volumes
            docker volume prune --force
          working_directory: ~/st2-packages
      - run:
          # Workaround for CircleCI docker-compose limitation where volumes don't work
          # See detailed explanation: https://circleci.com/docs/2.0/building-docker-images/#mounting-folders
          name: Copy st2-packages files to build containers
          command: |
            # creating dummy container which will hold a volume with data files
            docker create -v /root/st2-packages -v ${ST2_GITDIR} -v /root/build -v /var/log/st2 -v /root/.cache/pip -v /tmp/wheelhouse --name st2-packages-vol alpine:3.12 /bin/true
            # copy st2-packages data files into this volume
            docker cp ~/st2-packages st2-packages-vol:/root
            # copy st2 source files into this volume
            docker cp . st2-packages-vol:${ST2_GITDIR}

      - run:
          name: Pull dependent Docker Images
          command: .circle/docker-compose.sh pull ${DISTRO} || .circle/docker-compose.sh pull ${DISTRO}
          working_directory: ~/st2-packages
      - run:
          name: Build the ${DISTRO} Packages
          command: |
            .circle/docker-compose.sh build ${DISTRO}
            # Once build container finishes we can copy packages directly from it
            mkdir -p ~/st2/packages/${DISTRO}/log/
            docker cp st2-packages-vol:/root/build/. ~/st2/packages/${DISTRO}
          working_directory: ~/st2-packages
      - run:
          name: Inject virtualenv diagnostic test into st2-packages
          command: |
            set -x
            # Copy the diagnostic test file from st2 repo into st2-packages volume
            docker cp .circle/69-virtualenv-diagnostic_spec.rb st2-packages-vol:/root/st2-packages/rake/spec/default/69-virtualenv-diagnostic_spec.rb
            echo "Diagnostic test file copied into st2-packages volume at /root/st2-packages/rake/spec/default/"
      - run:
          name: Test the Packages
          command: .circle/docker-compose.sh test ${DISTRO}
          working_directory: ~/st2-packages
      - run:
          command: |
            set -x

            # Determine the test container name based on DISTRO
            if [ "$DISTRO" = "jammy" ]; then
              TEST_CONTAINER="st2-packages-jammytest-1"
            elif [ "$DISTRO" = "el9" ]; then
              TEST_CONTAINER="st2-packages-rockylinux9test-1"
            elif [ "$DISTRO" = "el8" ]; then
              TEST_CONTAINER="st2-packages-rockylinux8test-1"
            elif [ "$DISTRO" = "focal" ]; then
              TEST_CONTAINER="st2-packages-focaltest-1"
            else
              TEST_CONTAINER="st2-packages-${DISTRO}test-1"
            fi

            # Wait for container to be running
            timeout=30
            while [ $timeout -gt 0 ] && ! docker ps --format '{{.Names}}' | grep -q "${TEST_CONTAINER}"; do
              echo "Waiting for test container ${TEST_CONTAINER} to be ready..."
              sleep 1
              timeout=$((timeout - 1))
            done

            # Create diagnostic test file in the container
            docker exec ${TEST_CONTAINER} bash -c 'cat > /root/st2-packages/rake/spec/default/69-virtualenv-diagnostic_spec.rb << '\''EOF'\''
              # Diagnostic test to check virtualenv bundled wheels integrity
              describe "virtualenv bundled wheels diagnostic" do
                describe "Check virtualenv wheel integrity" do
                  describe command("bash -c '\''
              echo \"========================================\"
              echo \"  VIRTUALENV BUNDLED WHEELS DIAGNOSTIC\"
              echo \"========================================\"
              echo \"\"

              echo \"1. Virtualenv Version:\"
              /opt/stackstorm/st2/bin/python -m virtualenv --version || echo \"  ERROR: Could not determine virtualenv version\"
              echo \"\"

              echo \"2. Virtualenv Package Location:\"
              VENV_PKG=$(/opt/stackstorm/st2/bin/python -c \"import virtualenv; print(virtualenv.__file__)\" 2>/dev/null || echo \"\")
              if [ -z \"$VENV_PKG\" ]; then
                  echo \"  ERROR: Could not locate virtualenv package\"
                  exit 1
              fi
              VENV_DIR=$(dirname \"$VENV_PKG\")
              echo \"  Package dir:  $VENV_DIR\"
              echo \"\"

              echo \"3. Bundled Wheels Directory:\"
              WHEELS_DIR=\"$VENV_DIR/seed/wheels/embed\"
              if [ -d \"$WHEELS_DIR\" ]; then
                  echo \"  Location: $WHEELS_DIR\"
                  echo \"  Contents:\"
                  ls -lh \"$WHEELS_DIR\" | grep -E \"\\.(whl|txt)$\" || echo \"  No .whl files found\"
              else
                  echo \"  ERROR: Wheels directory not found at $WHEELS_DIR\"
              fi
              echo \"\"

              echo \"4. SHA256 Hashes of Key Bundled Wheels:\"
              if [ -d \"$WHEELS_DIR\" ]; then
                  for wheel in \"$WHEELS_DIR\"/pip-*.whl \"$WHEELS_DIR\"/setuptools-*.whl; do
                      if [ -f \"$wheel\" ]; then
                          BASENAME=$(basename \"$wheel\")
                          echo \"  File: $BASENAME\"
                          ACTUAL_HASH=$(sha256sum \"$wheel\" | awk \"{print \\$1}\")
                          echo \"    Actual SHA256: $ACTUAL_HASH\"
                          echo \"\"
                      fi
                  done
              fi

              echo \"5. Virtualenv Cache Status:\"
              CACHE_DIR=\"/root/.cache/virtualenv\"
              if [ -d \"$CACHE_DIR\" ]; then
                  echo \"  Cache location: $CACHE_DIR\"
                  CACHE_SIZE=$(du -sh \"$CACHE_DIR\" 2>/dev/null | awk \"{print \\$1}\")
                  echo \"  Cache size: $CACHE_SIZE\"
              else
                  echo \"  No cache found at $CACHE_DIR\"
              fi
              echo \"\"

              echo \"========================================\"
              echo \"  DIAGNOSTIC COMPLETE\"
              echo \"========================================\"
              '\'\'") do
                    its(:exit_status) { is_expected.to eq 0 }
                    its(:stdout) { is_expected.to match(/DIAGNOSTIC COMPLETE/) }
                  end
                end
              end
              EOF
              '

            echo "Diagnostic test file injected into ${TEST_CONTAINER}"
          working_directory: ~/st2-packages
      - run:
          name: Test the Packages
          command: .circle/docker-compose.sh test ${DISTRO}
          working_directory: ~/st2-packages
      - run:
          when: always
          name: Extract st2 service logs and diagnostics
          command: |
            set -x

            # Determine the test container name based on DISTRO
            if [ "$DISTRO" = "jammy" ]; then
              TEST_CONTAINER="st2-packages-jammytest-1"
            elif [ "$DISTRO" = "el9" ]; then
              TEST_CONTAINER="st2-packages-rockylinux9test-1"
            elif [ "$DISTRO" = "el8" ]; then
              TEST_CONTAINER="st2-packages-rockylinux8test-1"
            elif [ "$DISTRO" = "focal" ]; then
              TEST_CONTAINER="st2-packages-focaltest-1"
            else
              TEST_CONTAINER="st2-packages-${DISTRO}test-1"
            fi

            echo "Extracting logs from test container: ${TEST_CONTAINER}"

            # Create log directories
            mkdir -p ~/st2/packages/${DISTRO}/log/debug
            mkdir -p ~/st2/packages/${DISTRO}/log/st2

            # Check if container exists and is accessible
            if docker ps -a --format '{{.Names}}' | grep -q "${TEST_CONTAINER}"; then
              echo "Container ${TEST_CONTAINER} found"

              # Extract systemd journal logs for st2 services
              echo "Extracting st2api journal logs..."
              docker exec ${TEST_CONTAINER} journalctl -u st2api --no-pager -n 1000 > ~/st2/packages/${DISTRO}/log/debug/st2api-journal.log 2>&1 || echo "Failed to get st2api journal"

              echo "Extracting st2stream journal logs..."
              docker exec ${TEST_CONTAINER} journalctl -u st2stream --no-pager -n 1000 > ~/st2/packages/${DISTRO}/log/debug/st2stream-journal.log 2>&1 || echo "Failed to get st2stream journal"

              echo "Extracting st2auth journal logs..."
              docker exec ${TEST_CONTAINER} journalctl -u st2auth --no-pager -n 1000 > ~/st2/packages/${DISTRO}/log/debug/st2auth-journal.log 2>&1 || echo "Failed to get st2auth journal"

              echo "Extracting st2actionrunner journal logs..."
              docker exec ${TEST_CONTAINER} journalctl -u st2actionrunner --no-pager -n 1000 > ~/st2/packages/${DISTRO}/log/debug/st2actionrunner-journal.log 2>&1 || echo "Failed to get st2actionrunner journal"

              echo "Extracting st2notifier journal logs..."
              docker exec ${TEST_CONTAINER} journalctl -u st2notifier --no-pager -n 500 > ~/st2/packages/${DISTRO}/log/debug/st2notifier-journal.log 2>&1 || echo "Failed to get st2notifier journal"

              echo "Extracting st2workflowengine journal logs..."
              docker exec ${TEST_CONTAINER} journalctl -u st2workflowengine --no-pager -n 500 > ~/st2/packages/${DISTRO}/log/debug/st2workflowengine-journal.log 2>&1 || echo "Failed to get st2workflowengine journal"

              # Extract service status for st2 services
              echo "Extracting st2 service status..."
              docker exec ${TEST_CONTAINER} systemctl status st2api > ~/st2/packages/${DISTRO}/log/debug/st2api-status.log 2>&1 || echo "Failed to get st2api status"
              docker exec ${TEST_CONTAINER} systemctl status st2stream > ~/st2/packages/${DISTRO}/log/debug/st2stream-status.log 2>&1 || echo "Failed to get st2stream status"
              docker exec ${TEST_CONTAINER} systemctl status st2auth > ~/st2/packages/${DISTRO}/log/debug/st2auth-status.log 2>&1 || echo "Failed to get st2auth status"

              # Get overall st2 status
              echo "Extracting st2ctl status..."
              docker exec ${TEST_CONTAINER} st2ctl status > ~/st2/packages/${DISTRO}/log/debug/st2ctl-status.log 2>&1 || echo "Failed to get st2ctl status"

              # Get failed services
              echo "Extracting failed services..."
              docker exec ${TEST_CONTAINER} systemctl --failed --no-pager > ~/st2/packages/${DISTRO}/log/debug/systemctl-failed.log 2>&1 || echo "No failed services info"

              # Get process list
              echo "Extracting process list..."
              docker exec ${TEST_CONTAINER} ps auxf > ~/st2/packages/${DISTRO}/log/debug/processes.log 2>&1 || echo "Failed to get process list"

              # Get dependency service status
              echo "Extracting dependency service status..."
              docker exec ${TEST_CONTAINER} systemctl status mongodb --no-pager > ~/st2/packages/${DISTRO}/log/debug/mongodb-status.log 2>&1 || true
              docker exec ${TEST_CONTAINER} systemctl status rabbitmq-server --no-pager > ~/st2/packages/${DISTRO}/log/debug/rabbitmq-status.log 2>&1 || true
              docker exec ${TEST_CONTAINER} systemctl status postgresql --no-pager > ~/st2/packages/${DISTRO}/log/debug/postgresql-status.log 2>&1 || true
              docker exec ${TEST_CONTAINER} systemctl status redis --no-pager > ~/st2/packages/${DISTRO}/log/debug/redis-status.log 2>&1 || true

              # Get st2 configuration
              echo "Extracting st2 configuration..."
              docker exec ${TEST_CONTAINER} cat /etc/st2/st2.conf > ~/st2/packages/${DISTRO}/log/debug/st2.conf 2>&1 || echo "Failed to get st2.conf"

              # Copy application logs from /var/log/st2
              echo "Copying application logs from /var/log/st2..."
              docker exec ${TEST_CONTAINER} ls -la /var/log/st2/ > ~/st2/packages/${DISTRO}/log/debug/var-log-st2-listing.log 2>&1 || true
              docker cp ${TEST_CONTAINER}:/var/log/st2/. ~/st2/packages/${DISTRO}/log/st2/ 2>&1 || echo "Failed to copy /var/log/st2"

              echo "Log extraction completed successfully"
              ls -lah ~/st2/packages/${DISTRO}/log/debug/
            else
              echo "ERROR: Container ${TEST_CONTAINER} not found!"
              echo "Available containers:"
              docker ps -a --format '{{.Names}}'

              # Try to find any test container
              echo "Attempting to extract logs from any available test container..."
              for container in $(docker ps -a --format '{{.Names}}' | grep -E 'test'); do
                echo "Found test container: $container"
                docker exec $container journalctl -u st2api --no-pager -n 500 > ~/st2/packages/${DISTRO}/log/debug/${container}-st2api.log 2>&1 || true
                docker exec $container st2ctl status > ~/st2/packages/${DISTRO}/log/debug/${container}-st2ctl.log 2>&1 || true
                docker exec $container systemctl --failed --no-pager > ~/st2/packages/${DISTRO}/log/debug/${container}-failed.log 2>&1 || true
              done
            fi
          working_directory: ~/st2-packages
      - run:
          when: always
          name: Grab the st2 logs from volume
          command: |
            docker run --rm --volumes-from st2-packages-vol alpine:3.12 find / -name "st2*.log"  2>/dev/null
            docker cp st2-packages-vol:/var/log/st2 ~/st2/packages/${DISTRO}/log/st2-volume 2>&1 || echo "Could not copy from volume container"
      - store_artifacts:
          path: ~/st2/packages
          destination: packages
      - persist_to_workspace:
          root: packages
          paths:
            - .
      # Verify that Docker environment is properly cleaned up, and there is nothing left for the next build
      # See issue: https://discuss.circleci.com/t/no-space-left-on-device-while-creating-mongo/11532/13
      - run:
          name: Post Docker cleanup
          # don't cleanup resources on error since failed container might be used for SSH debug
          when: on_success
          command: |
            set -x
            # Clean-up running containers
            .circle/docker-compose.sh clean
            # Remove st2-packages-vol container
            docker rm -v --force st2-packages-vol || true
            # Clean-up any created volumes
            docker volume prune --force
          working_directory: ~/st2-packages

  # Deploy produced deb/rpm packages to PackageCloud staging
  deploy:
    docker:
      # The primary container is an instance of the first list image listed. Your build commands run in this container.
      - image: cimg/ruby:2.7
    working_directory: /tmp/deploy
    environment:
      - DISTROS: "jammy el9"
    steps:
      - attach_workspace:
          at: .
      - run:
          name: List workspace files
          command: find . | sed 's|[^/]*/|  |g'
      - run:
          name: Install dependencies
          command: |
            set -x
            sudo apt-get -y install parallel jq
            gem install package_cloud
            sudo wget -O /usr/local/bin/packagecloud.sh https://raw.githubusercontent.com/StackStorm/st2-packages/master/.circle/packagecloud.sh && sudo chmod +x /usr/local/bin/packagecloud.sh
      - run:
          name: Deploy deb/rpm packages to PackageCloud
          command: "parallel -v -j0 --line-buffer packagecloud.sh deploy {} {} ::: ${DISTROS}"

# TODO: Return to workflows when "Auto-cancel redundant builds” feature is implemented for Workflows: https://discuss.circleci.com/t/auto-cancel-redundant-builds-not-working-for-workflow/13852
# Putting everything together
workflows:
  version: 2
  package-test-and-deploy:
    jobs:
      - packages
      - deploy:
          requires:
            - packages
          filters:
            branches:
              only:
                - master
                - /v[0-9]+\.[0-9]+/
                - feature/circleci

experimental:
  notify:
    branches:
      only:
        - master
        - /v[0-9]+\.[0-9]+/

notify:
  webhooks:
    - url: https://ci-webhooks.stackstorm.com/webhooks/build/events
